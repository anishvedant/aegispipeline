# Lightweight monitoring stack, runs on the Kali VM without needing
# the full in-cluster kube-prometheus-stack. Prometheus scrapes the
# GrokGuard exporter, Grafana visualizes it.
services:
  prometheus:
    image: prom/prometheus:v2.53.0
    network_mode: host
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  grafana:
    image: grafana/grafana:11.1.0
    network_mode: host
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=grokguard
