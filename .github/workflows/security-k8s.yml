# Early Kubernetes manifest visibility.
# The authoritative runtime gate is Kyverno inside the live cluster.

name: grokguard-k8s-validation

on:
  push:
    branches: ["main"]
    paths:
      - "k8s/**"
      - ".github/workflows/security-k8s.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "k8s/**"
      - ".github/workflows/security-k8s.yml"

permissions:
  contents: read

jobs:
  checkov-k8s:
    name: Kubernetes visibility scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install "checkov==3.3.7"

      - name: Scan hardened Kubernetes workload
        run: |
          mkdir -p reports
          checkov \
            -d k8s/workloads/secure \
            --framework kubernetes \
            --soft-fail \
            -o cli -o json \
            --output-file-path console,reports/checkov-k8s.json

      - name: Upload Checkov Kubernetes results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-k8s-results
          path: reports/checkov-k8s.json
          if-no-files-found: warn

  trivy-k8s:
    name: Kubernetes visibility scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan hardened Kubernetes workload
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: k8s/workloads/secure
          scanners: misconfig
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: json
          output: reports/trivy-k8s.json

      - name: Upload Trivy Kubernetes results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-k8s-results
          path: reports/trivy-k8s.json
          if-no-files-found: warn
