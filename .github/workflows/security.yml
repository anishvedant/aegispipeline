# Main DevSecOps security workflow.
# Checkov and Gitleaks are blocking controls.
# Trivy is retained as a secondary visibility layer in this lab.

name: security-gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  iac-scan:
    name: IaC gate (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install "checkov==3.3.7"

      - name: Run Checkov against hardened deploy staging
        env:
          # Explicitly accepted lab-only gaps. These remain documented in README.md.
          CHECKOV_ACCEPTED_LAB_GAPS: "CKV2_AWS_5,CKV2_AWS_62,CKV2_AWS_61,CKV_AWS_18,CKV_AWS_144,CKV_AWS_145"
        run: |
          mkdir -p reports
          checkov \
            -d terraform/deploy \
            --framework terraform \
            --external-checks-dir policies \
            --skip-check "$CHECKOV_ACCEPTED_LAB_GAPS" \
            --soft-fail-on LOW,MEDIUM \
            --hard-fail-on HIGH,CRITICAL \
            -o cli -o json \
            --output-file-path console,reports/checkov.json

      - name: Upload Checkov results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: reports/checkov.json
          if-no-files-found: warn

  trivy-config:
    name: IaC visibility scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy configuration scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform/deploy
          scanners: misconfig
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: json
          output: reports/trivy-config.json

      - name: Upload Trivy configuration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-config-results
          path: reports/trivy-config.json
          if-no-files-found: warn

  secrets-scan:
    name: Secrets gate (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full Git history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    name: Container visibility scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build hardened demo image
        run: docker build -t "aegis-demo:${{ github.sha }}" -f docker/Dockerfile docker/

      - name: Scan hardened demo image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: "aegis-demo:${{ github.sha }}"
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: json
          output: reports/trivy-image.json

      - name: Upload image scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-results
          path: reports/trivy-image.json
          if-no-files-found: warn

  gate-summary:
    name: Gate verdict
    runs-on: ubuntu-latest
    needs: [iac-scan, trivy-config, secrets-scan, container-scan]
    steps:
      - name: All required controls passed
        run: |
          echo "Security gate PASSED."
          echo "Checkov found no unaccepted HIGH/CRITICAL IaC findings."
          echo "Gitleaks found no committed secrets."
          echo "Trivy configuration and image reports were generated for review."
